<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>產生 PWA Icons</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 640px;
      margin: 24px auto;
      padding: 16px;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 { font-size: 20px; }
    canvas { border: 1px solid #cbd5e1; margin: 8px; vertical-align: middle; }
    button {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    p.tip { color: #475569; font-size: 14px; }
    code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>產生 PWA Icons</h1>
  <p>點下方按鈕，會自動下載 3 個 PNG：<code>apple-touch-icon.png</code>、<code>icon-192.png</code>、<code>icon-512.png</code>。把它們放到 <code>public/</code> 即可。</p>

  <div id="previews"></div>

  <button id="dl">下載全部 (3 個 PNG)</button>

  <p class="tip">如果想換樣式（顏色、文字），改下方 <code>drawIcon()</code> 函式裡的常數。</p>

  <script>
    const SIZES = [
      { name: 'apple-touch-icon.png', size: 180 },
      { name: 'icon-192.png', size: 192 },
      { name: 'icon-512.png', size: 512 },
    ];

    const BG = '#0f172a';
    const FG = '#3b82f6';
    const TEXT = '4×';

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;

      // Background (rounded square — maskable safe-zone covered)
      ctx.fillStyle = BG;
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // Inner accent ring
      ctx.strokeStyle = FG;
      ctx.lineWidth = size * 0.04;
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.32, 0, Math.PI * 2);
      ctx.stroke();

      // Text "4×"
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + (size * 0.38) + 'px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(TEXT, size / 2, size / 2 + size * 0.02);
    }

    function preview() {
      const wrap = document.getElementById('previews');
      wrap.innerHTML = '';
      for (const { name, size } of SIZES) {
        const c = document.createElement('canvas');
        const display = Math.min(size, 128);
        c.style.width = display + 'px';
        c.style.height = display + 'px';
        drawIcon(c, size);
        wrap.appendChild(c);
      }
    }
    preview();

    function downloadCanvas(canvas, filename) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          resolve();
        }, 'image/png');
      });
    }

    document.getElementById('dl').addEventListener('click', async () => {
      for (const { name, size } of SIZES) {
        const c = document.createElement('canvas');
        drawIcon(c, size);
        await downloadCanvas(c, name);
        await new Promise(r => setTimeout(r, 300));
      }
    });
  </script>
</body>
</html>
